services:
  postgres:
    image: postgres:17-alpine
    container_name: wanderbook-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: wanderbook
      POSTGRES_PASSWORD: wanderbook_dev_password
      POSTGRES_DB: wanderbook
    ports:
      - '5432:5432'
    volumes:
      - wanderbook-db-data:/var/lib/postgresql/data

volumes:
  wanderbook-db-data: